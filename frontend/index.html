<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#3B82F6">
    <title>Flashcard 复习系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>">
</head>
<body>
    <!-- 登录页面 -->
    <div class="login-container">
        <div class="login-box">
            <h1>📚 Flashcard</h1>
            <form onsubmit="handleLogin(event)">
                <input type="password" id="password" placeholder="请输入密码" required>
                <button type="submit" class="btn btn-primary btn-block">登录</button>
            </form>
        </div>
    </div>
    
    <!-- 主应用 -->
    <div class="app-container">
        <div id="page-content">
            <!-- 页面内容由 JS 动态渲染 -->
        </div>
    </div>
    
    <!-- 底部导航 -->
    <nav class="bottom-nav">
        <div class="nav-item active" data-page="today" onclick="navigateTo('today')">
            <span class="icon">🏠</span>
            <span>今日</span>
        </div>
        <div class="nav-item" data-page="add" onclick="navigateTo('add')">
            <span class="icon">➕</span>
            <span>添加</span>
        </div>
        <div class="nav-item" data-page="weak" onclick="navigateTo('weak')">
            <span class="icon">⚠️</span>
            <span>弱项</span>
        </div>
        <div class="nav-item" data-page="manage" onclick="navigateTo('manage')">
            <span class="icon">📁</span>
            <span>管理</span>
        </div>
    </nav>
    
    <!-- 模态框 -->
    <div class="modal-overlay" onclick="if(event.target === this) closeModal()">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title">标题</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- 模态框内容 -->
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" id="modal-confirm">确定</button>
            </div>
        </div>
    </div>
    
    <!-- Toast 容器 -->
    <div class="toast-container"></div>
    
    <script src="/static/js/api.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
